<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habitat — Your Spot. Your Hood.</title>
    <meta
      name="description"
      content="South Africa's verified rental platform. Browse backrooms, cottages and flatlets. Apply, sign, and pay — fully online."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Habitat" />
    <meta property="og:title" content="Habitat — Your Spot. Your Hood." />
    <meta
      property="og:description"
      content="Verified rentals across South Africa. Find a hood, apply online, sign in app."
    />
    <meta property="og:url" content="https://habitat.co.za/" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Habitat — Your Spot. Your Hood." />
    <meta
      name="twitter:description"
      content="Verified rentals across South Africa. Find a hood, apply online, sign in app."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!--
      Google Maps Places SDK. Reusing backroom's API key (referrer-restricted
      in GCP). Loaded async + defer so it doesn't block first paint;
      consumers (AddressLookup today, /browse + /property-detail later) await
      `google.maps.importLibrary(...)` before use, which transparently waits
      for the script to finish loading.
    -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyComWXDCPtCenbiXmqcBfCMDlONckAzrvg&libraries=places&loading=async&v=weekly"
      async
      defer
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
