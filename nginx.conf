server {
    listen 80 default_server;
    server_name _;

    # Built assets — long-cache hashed files, no-cache the entry HTML.
    root /usr/share/nginx/html;
    index index.html;

    # Tiny endpoint for the container HEALTHCHECK.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Reverse-proxy /api/* to habitat-api so the UI can keep using the
    # relative /api/v1/... base URL it uses against the Vite dev server.
    location /api/ {
        proxy_pass         http://habitat-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Long-cache hashed asset files emitted by Vite.
    location /assets/ {
        access_log off;
        expires    7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files  $uri =404;
    }

    # SPA fallback — every unknown path returns index.html so React Router can
    # take over client-side. Disable caching on the entry doc so deploys are
    # picked up immediately.
    location / {
        add_header Cache-Control "no-store" always;
        try_files  $uri $uri/ /index.html;
    }
}
